server:
  port: 8083

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/shabarish
    username: root
    password: Shabarish@8945
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# ✅ 🔥 Tracing Configuration
management:
  tracing:
    sampling:
      probability: 1.0  # capture all traces (dev only)

  otel:
    service-name: Auth-service
    exporter:
      otlp:
        endpoint: http://localhost:4317
        protocol: grpc  # required for Jaeger OTLP

  endpoints:
    web:
      exposure:
        include: "*"