server:
  port: 8083

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/shabarish
    username: root
    password: Shabarish@8945
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# ===== Actuator + Tracing Configuration =====
management:
  endpoints:
    web:
      exposure:
        include: env, health, beans, info, metrics, httptrace

  endpoint:
    health:
      show-details: always

  # ✅ 🔥 ADD TRACING HERE
  tracing:
    sampling:
      probability: 1.0   # trace all requests (reduce in prod)

  otlp:
    tracing:
      endpoint: http://localhost:4317
      transport: grpc