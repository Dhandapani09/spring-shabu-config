server:
  port: 9090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
        - id: member-service
          uri: lb://MEMBER-SERVICE
          predicates:
            - Path=/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# ✅ 🔥 Jaeger + OpenTelemetry Configuration

management:
  tracing:
    sampling:
      probability: 1.0   # trace all requests (dev)

  otlp:
    tracing:
      endpoint: http://localhost:4317
      transport: grpc   # important for Jaeger

  endpoints:
    web:
      exposure:
        include: "*"