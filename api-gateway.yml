server:
  port: 9090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
        - id: member-service
          uri: lb://MEMBER-SERVICE
          predicates:
            - Path=/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# ===== Jaeger + OpenTelemetry Configuration =====
management:
  tracing:
    sampling:
      probability: 1.0  # capture all traces (dev only)

  otel:
    service-name: api-gateway
    exporter:
      otlp:
        endpoint: http://localhost:4317
        protocol: grpc  # required for Jaeger OTLP

  endpoints:
    web:
      exposure:
        include: "*"