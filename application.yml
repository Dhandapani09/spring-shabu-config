server:
  port: 8888

spring:
  application:
    name: cloud-config-server

  cloud:
    config:
      server:
        git:
          uri: https://github.com/your-username/config-repo
          default-label: main
          clone-on-start: true					
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/					